name: CI Tests

on:
  pull_request:
    branches: [main, dev]

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Run testing suite
        run: npm run test