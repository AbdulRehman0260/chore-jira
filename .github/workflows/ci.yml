name: ci

on:
  pull_request:
    branches: [main, dev]

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run testing suite
        run: npm run test

  style:
      name: style
      runs-on: ubuntu-latest

      defaults:
        run:
          working-directory: backend

      steps:
        - name: Check out code
          uses: actions/checkout@v4

        - name: Set up Node
          uses: actions/setup-node@v4
          with:
            node-version: 20

        - name: Install dependencies
          run: npm ci

        - name: check and fix styling
          run: npm run format:write